name: PR Labeler

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-labels:
    uses: ./.github/workflows/reusable-sync-labels.yml

  labeler:
    name: Label Pull Request
    needs: sync-labels
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Apply path and branch labels
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Apply PR title type labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          labels=()

          if [[ "$PR_TITLE" =~ ^release: ]]; then
            labels+=("release")
          elif [[ "$PR_TITLE" =~ ^fix(\(.+\))?: ]]; then
            labels+=("type:bug")
          elif [[ "$PR_TITLE" =~ ^feat(\(.+\))?: ]]; then
            labels+=("type:feature")
          elif [[ "$PR_TITLE" =~ ^docs(\(.+\))?: ]]; then
            labels+=("type:docs")
          elif [[ "$PR_TITLE" =~ ^refactor(\(.+\))?: ]]; then
            labels+=("type:refactor")
          elif [[ "$PR_TITLE" =~ ^(chore|build|ci|test|perf|revert)(\(.*\))?: ]]; then
            labels+=("type:chore")
          fi

          for label in "${labels[@]}"; do
            gh api \
              --method POST \
              "repos/$REPOSITORY/issues/$PR_NUMBER/labels" \
              -f "labels[]=$label" \
              >/dev/null
          done
