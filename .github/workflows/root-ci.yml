name: Root CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: root-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.34.4"
  NEXT_TELEMETRY_DISABLED: "1"
  CI: "true"
  APP_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/birth_chart_generator_ci
  NEXT_PUBLIC_APP_NAME: Birth Chart Generator

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Check formatting
        run: pnpm format:check

      - name: Check schema migrations
        run: pnpm db:check-migration

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test:unit

  build:
    name: Production Build
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      APP_ENV: production
      NODE_ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Next.js cache
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: root-next-node-${{ env.NODE_VERSION }}-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'components/**', 'hooks/**', 'lib/**', 'packages/**', 'services/**', 'workers/**', 'next.config.ts', 'postcss.config.mjs', 'tsconfig.json') }}
          restore-keys: |
            root-next-node-${{ env.NODE_VERSION }}-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build
        run: pnpm build
