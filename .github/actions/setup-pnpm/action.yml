name: Setup pnpm
description: Set up pnpm and Node.js with pnpm store caching.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "24"
  pnpm-version:
    description: pnpm version to install.
    required: false
    default: "10.34.4"
  cache-dependency-path:
    description: Lockfile path used for the pnpm cache key.
    required: true

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
